version: 2

models:
  - name: dim_date
    description: Calendar dimension generated from inventory source dates through the current date.
    columns:
      - name: date_key
        tests:
          - not_null
          - unique

  - name: dim_material
    description: Conformed material dimension for inventory and future sales and procurement marts.
    columns:
      - name: material_key
        tests:
          - not_null
          - unique

  - name: dim_customer
    description: Conformed customer dimension for sales and fulfillment marts.
    columns:
      - name: customer_key
        tests:
          - not_null
          - unique

  - name: dim_supplier
    description: Conformed supplier dimension for procurement marts, including an unknown/internal-transfer member.
    columns:
      - name: supplier_key
        tests:
          - not_null
          - unique

  - name: dim_plant
    description: Conformed plant dimension derived from plant master data.
    columns:
      - name: plant_key
        tests:
          - not_null
          - unique

  - name: dim_sales_org
    description: Conformed sales organization dimension.
    columns:
      - name: sales_org_key
        tests:
          - not_null
          - unique

  - name: dim_pricing_condition_type
    description: Conformed pricing condition type dimension for sales pricing analysis.
    columns:
      - name: pricing_condition_type_key
        tests:
          - not_null
          - unique

  - name: dim_distribution_channel
    description: Conformed distribution channel dimension.
    columns:
      - name: distribution_channel_key
        tests:
          - not_null
          - unique

  - name: dim_storage_location
    description: Storage location dimension keyed by client, plant, and storage location.
    columns:
      - name: storage_location_key
        tests:
          - not_null
          - unique

  - name: fct_inventory_snapshot
    description: Inventory snapshot fact table keyed to date, material, plant, and storage location dimensions.
    columns:
      - name: snapshot_date_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: material_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_material')
                field: material_key
      - name: plant_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_plant')
                field: plant_key
      - name: storage_location_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_storage_location')
                field: storage_location_key

  - name: fct_sales_billing
    description: Billing item fact table keyed to date, customer, material, sales organization, and distribution channel dimensions.
    columns:
      - name: billing_date_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: customer_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_key
      - name: material_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_material')
                field: material_key
      - name: sales_org_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_sales_org')
                field: sales_org_key
      - name: distribution_channel_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_distribution_channel')
                field: distribution_channel_key
      - name: plant_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_plant')
                field: plant_key
      - name: storage_location_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_storage_location')
                field: storage_location_key

  - name: fct_sales_pricing
    description: Billing item pricing fact table at billing item by pricing condition type grain.
    columns:
      - name: billing_date_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: customer_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_key
      - name: material_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_material')
                field: material_key
      - name: sales_org_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_sales_org')
                field: sales_org_key
      - name: distribution_channel_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_distribution_channel')
                field: distribution_channel_key
      - name: pricing_condition_type_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_pricing_condition_type')
                field: pricing_condition_type_key
      - name: plant_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_plant')
                field: plant_key
      - name: storage_location_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_storage_location')
                field: storage_location_key

  - name: fct_order_fulfillment
    description: Sales order item fulfillment fact table keyed to customer, material, sales organization, plant, and date dimensions.
    columns:
      - name: order_date_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: requested_delivery_date_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: actual_delivery_date_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: customer_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_key
      - name: material_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_material')
                field: material_key
      - name: sales_org_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_sales_org')
                field: sales_org_key
      - name: distribution_channel_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_distribution_channel')
                field: distribution_channel_key
      - name: plant_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_plant')
                field: plant_key
      - name: storage_location_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_storage_location')
                field: storage_location_key

  - name: fct_procurement_schedule
    description: Purchase order schedule line fact table keyed to supplier, material, plant, and date dimensions.
    columns:
      - name: purchase_order_date_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: planned_delivery_date_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: supplier_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_supplier')
                field: supplier_key
      - name: material_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_material')
                field: material_key
      - name: plant_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_plant')
                field: plant_key
      - name: storage_location_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_storage_location')
                field: storage_location_key
